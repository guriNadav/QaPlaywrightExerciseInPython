name: Python Playwright Allure Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      # פותר את אזהרת ה-Node.js שקיבלת
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # התקנה מפורשת של הכלים כדי למנוע exit code 4
          pip install pytest pytest-playwright allure-pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Playwright Browsers
        run: playwright install --with-deps

      - name: Run tests
        run: |
          # הרצה בפורמט בטוח יותר
          pytest --alluredir=allure-results --headless --screenshot=on --video=retain-on-failure
        env:
          EBAY_USER: ${{ secrets.EBAY_USER }}
          EBAY_PASS: ${{ secrets.EBAY_PASS }}
        continue-on-error: true

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Allure Report Action
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 30

      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Post Allure Report Link
        if: always()
        run: |
          echo "## 📊 Allure Test Report" >> $GITHUB_STEP_SUMMARY
          echo "Latest results are available here: [🌐 View Report](https://github.io)" >> $GITHUB_STEP_SUMMARY

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-artifacts
          path: |
            test-results/
            allure-results/
          retention-days: 30
