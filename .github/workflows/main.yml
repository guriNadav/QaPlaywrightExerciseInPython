name: Python Playwright Allure Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest 

      - name: Install Playwright Browsers
        run: playwright install --with-deps

      - name: Run tests
        run: |
          python -m pytest --alluredir=allure-results
        env:
          EBAY_USER: ${{ secrets.EBAY_USER }}
          EBAY_PASS: ${{ secrets.EBAY_PASS }}
        continue-on-error: true

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Allure Report Action
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 30 

      - name: Deploy report to Github Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Post Allure Report Link
        if: always()
        run: |
          echo "## 📊 Allure Test Report" >> $GITHUB_STEP_SUMMARY
          echo "Latest results are available here: [🌐 View Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }})" >> $GITHUB_STEP_SUMMARY
        #   echo "Latest results are available here: [🌐 View Report]https://770gay.github.io/QaPlaywrightExercise" >> $GITHUB_STEP_SUMMARY

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-artifacts
          path: |
            test-results/
            screenshots/
          retention-days: 30 # שמירת צילומי מסך וסרטונים ל-30 יום
